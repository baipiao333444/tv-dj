<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Jelly</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root {
            --bg-opacity: 0.85;
            --bg-base: rgba(20, 24, 28, var(--bg-opacity));
            --bg-hover: rgba(45, 55, 65, 0.8);

            --text-primary: #cceaff;
            --text-secondary: #8bb1cc;
            --text-symbol: #5caaf6;

            --color-up: #4ade80;
            --color-down: #f87171;

            --col-name: 25%;
            --col-price: 25%;
            --col-change: 22%;
            --col-vol: 20%;
        }

        body { margin: 0; padding: 0; background-color: var(--bg-base); color: var(--text-primary); font-family: "Segoe UI", "Microsoft YaHei", sans-serif; font-size: 15px; user-select: none; overflow: hidden; border-radius: 10px; border: 1px solid rgba(204, 234, 255, 0.1); transition: background-color 0.3s; display: flex; flex-direction: column; height: 100vh; }
        ::-webkit-scrollbar { display: none; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; -webkit-app-region: drag; }
        .header:active { cursor: grabbing; }
        .title { font-weight: bold; font-size: 16px; letter-spacing: 1px; color: var(--text-secondary); pointer-events: none;}
        .actions { display: flex; gap: 4px; align-items: center; -webkit-app-region: no-drag; }
        .icon-btn { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 6px 10px; border-radius: 6px; font-size: 16px; transition: 0.15s; }
        .icon-btn:hover { background: rgba(204,234,255,0.15); color: var(--text-primary); }
        .icon-btn.active { color: var(--color-up); }
        .divider { width: 1px; height: 16px; background: rgba(204,234,255,0.15); margin: 0 6px; }
        .btn-close:hover { background: rgba(248, 113, 113, 0.2); color: var(--color-down); }

        #settings-panel { display: none; background: rgba(30,36,42,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(204,234,255,0.1); padding: 15px 18px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: var(--text-secondary); }
        .setting-row input { flex: 1; margin: 0 15px; cursor: pointer; }

        /* --- 修正后的表头网格 (去掉多余的1fr) --- */
        .list-header { display: grid; grid-template-columns: 20px var(--col-name) var(--col-price) var(--col-change) var(--col-vol); padding: 8px 15px; font-size: 13px; color: var(--text-secondary); font-weight: bold; border-bottom: 1px solid rgba(204,234,255,0.1); }
        .header-cell { position: relative; display: flex; align-items: center; white-space: nowrap; }
        .header-cell.right { justify-content: flex-end; }
        .resize-handle { position: absolute; right: -5px; top: 0; bottom: 0; width: 10px; cursor: col-resize; z-index: 10; }
        .resize-handle:hover::after { content: ''; position: absolute; left: 4px; top: 20%; height: 60%; width: 2px; background: var(--text-secondary); border-radius: 2px; }

        .content-scroll { flex: 1; overflow-y: auto; padding: 10px 0; }
        .drag-handle { color: rgba(204,234,255,0.2); cursor: grab; padding-right: 6px; font-size: 16px; transition: color 0.2s; display: flex; align-items: center;}
        .folder-header:hover .drag-handle, .symbol-item:hover .drag-handle { color: var(--text-secondary); }
        .drag-handle:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.3; background: rgba(204, 234, 255, 0.08) !important; border: 1px dashed var(--text-secondary); border-radius: 6px; }
        .sortable-drag { cursor: grabbing !important; }

        /* --- 为悬浮删除做准备：相对定位 --- */
        .folder-header { position: relative; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; cursor: pointer; color: var(--text-secondary); font-weight: bold; font-size: 14px; border-radius: 6px;}
        .folder-header:hover { background: var(--bg-hover); color: var(--text-primary); }
        .arrow { font-size: 11px; transition: transform 0.2s ease; margin-right: 8px; display: inline-block;}
        .folder.closed .arrow { transform: rotate(-90deg); }
        .folder.closed .symbol-list { display: none; }
        .folder-title-text { pointer-events: none; }

        .symbol-item { position: relative; display: grid; grid-template-columns: 20px var(--col-name) var(--col-price) var(--col-change) var(--col-vol); align-items: center; padding: 10px 15px; transition: background-color 0.15s; border-radius: 6px;}
        .symbol-item:hover { background: var(--bg-hover); }
        .col-val { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none;}
        .col-val.name { font-weight: bold; font-size: 16px; letter-spacing: 0.5px; color: var(--text-symbol); }
        .col-val.price { text-align: right; font-weight: bold; font-size: 16px; }
        .col-val.change { text-align: right; font-weight: bold; font-size: 15px;}
        .col-val.vol { text-align: right; font-size: 13px; color: var(--text-secondary); }

        .text-up { color: var(--color-up); }
        .text-down { color: var(--color-down); }
        .text-neutral { color: var(--text-secondary); }

        /* ================= 核心修改：悬浮覆盖式删除按钮 ================= */
        .btn-del {
            position: absolute;
            right: 0px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--bg-hover); /* 背景色遮挡底层数字 */
            box-shadow: -10px 0 15px var(--bg-hover); /* 边缘渐变，融入背景 */
            color: rgba(248, 113, 113, 0.6);
            cursor: pointer;
            font-size: 20px;
            padding: 2px 10px;
            border-radius: 6px;
            opacity: 0;
            pointer-events: none; /* 隐藏时不可点击 */
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }
        /* 鼠标悬浮时，按钮向左滑出并显现 */
        .folder-header:hover .btn-del,
        .symbol-item:hover .btn-del {
            opacity: 1;
            pointer-events: auto;
            right: 8px; /* 往左边挤进来一点点，形成动态感 */
        }
        /* 删除按钮自身的悬浮状态 */
        .btn-del:hover {
            background: rgba(248, 113, 113, 0.2) !important;
            color: var(--color-down) !important;
            box-shadow: none;
        }

        @keyframes textFlashUp { 0% { color: #bbf7d0; text-shadow: 0 0 10px rgba(74, 222, 128, 0.6); } 100% { color: var(--color-up); } }
        @keyframes textFlashDown { 0% { color: #fecaca; text-shadow: 0 0 10px rgba(248, 113, 113, 0.6); } 100% { color: var(--color-down); } }
        .flash-up { animation: textFlashUp 0.8s ease-out; color: var(--color-up) !important; }
        .flash-down { animation: textFlashDown 0.8s ease-out; color: var(--color-down) !important; }
    </style>
</head>
<body>

    <div class="header" id="drag-header">
        <div class="title">行情</div>
        <div class="actions">
            <button class="icon-btn" onclick="toggleSettings()" title="设置" id="set-btn">⚙</button>
            <button class="icon-btn" onclick="addFolder()" title="新建分类">📁</button>
            <button class="icon-btn" onclick="addSymbol()" title="添加代币">➕</button>
            <button class="icon-btn" id="pin-btn" onclick="togglePin()" title="窗口置顶">📌</button>
            <div class="divider"></div>
            <button class="icon-btn" onclick="console.log('CMD_MIN')" title="最小化">一</button>
            <button class="icon-btn btn-close" onclick="console.log('CMD_CLOSE')" title="关闭" style="font-size:18px;">×</button>
        </div>
    </div>

    <div id="settings-panel">
        <div class="setting-row">
            <span>窗口透明度</span>
            <input type="range" min="5" max="100" value="85" id="opacity-range" oninput="updateOpacity(this.value)">
            <span id="opacity-val" style="min-width:40px; text-align:right;">85%</span>
        </div>
        <div class="setting-row" style="margin-top: 12px; justify-content: flex-end;">
            <button class="icon-btn" style="font-size:13px; border:1px solid rgba(204,234,255,0.2);" onclick="exportData()">导出配置</button>
            <button class="icon-btn" style="font-size:13px; border:1px solid rgba(204,234,255,0.2); margin-left:10px;" onclick="importData()">导入配置</button>
        </div>
    </div>

    <div class="list-header">
        <div></div>
        <div class="header-cell" data-col="name">商品<div class="resize-handle"></div></div>
        <div class="header-cell right" data-col="price">最新价<div class="resize-handle"></div></div>
        <div class="header-cell right" data-col="change">涨跌幅<div class="resize-handle"></div></div>
        <div class="header-cell right" data-col="vol">成交额<div class="resize-handle"></div></div>
    </div>

    <div class="content-scroll" id="app-content"></div>

    <script>
        document.getElementById('drag-header').addEventListener('mousedown', function(e) {
            if (!e.target.closest('.actions')) console.log('CMD_DRAG');
        });

        let data = JSON.parse(localStorage.getItem('jelly_data')) || [
            { id: 'f1', name: '自选行情', isOpen: true, symbols: ['BTCUSDT', 'ETHUSDT', 'SOLUSDT'] }
        ];
        let marketCache = {}; let globalPrices = {}; let utc0Opens = {};

        function initSettings() {
            const savedOpacity = localStorage.getItem('jelly_opacity') || "85";
            updateOpacity(savedOpacity, false);
            document.getElementById('opacity-range').value = savedOpacity;
            ['name', 'price', 'change', 'vol'].forEach(col => {
                const w = localStorage.getItem(`jelly_col_${col}`);
                if(w) document.documentElement.style.setProperty(`--col-${col}`, w);
            });
        }
        function updateOpacity(val, save = true) {
            document.documentElement.style.setProperty('--bg-opacity', val / 100);
            document.getElementById('opacity-val').innerText = val + '%';
            if (save) localStorage.setItem('jelly_opacity', val);
        }
        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            const btn = document.getElementById('set-btn');
            const isVisible = panel.style.display === 'block';
            panel.style.display = isVisible ? 'none' : 'block';
            btn.classList.toggle('active', !isVisible);
        }
        function initColumnResizer() {
            const handles = document.querySelectorAll('.resize-handle');
            let startX, startWidth, colName;
            handles.forEach(handle => {
                handle.addEventListener('mousedown', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    colName = e.target.parentElement.getAttribute('data-col');
                    startX = e.pageX;
                    startWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue(`--col-${colName}`).trim());
                    document.documentElement.style.cursor = 'col-resize';
                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });
            });
            function onMouseMove(e) {
                let newWidth = startWidth + ((e.pageX - startX) / document.body.clientWidth) * 100;
                if (newWidth < 15) newWidth = 15; if (newWidth > 50) newWidth = 50;
                document.documentElement.style.setProperty(`--col-${colName}`, `${newWidth}%`);
            }
            function onMouseUp() {
                document.documentElement.style.cursor = 'default';
                document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp);
                localStorage.setItem(`jelly_col_${colName}`, getComputedStyle(document.documentElement).getPropertyValue(`--col-${colName}`).trim());
            }
        }
        function formatVol(volStr) {
            const v = parseFloat(volStr); if (isNaN(v)) return '--';
            if (v >= 100000000) return (v / 100000000).toFixed(2) + '亿';
            if (v >= 10000) return (v / 10000).toFixed(2) + '万';
            return v.toFixed(2);
        }

        function render() {
            const container = document.getElementById('app-content');
            let html = '';

            data.forEach((folder, fIndex) => {
                let symbolRows = ''; let folderSum = 0; let validCount = 0;

                folder.symbols.forEach((sym, sIndex) => {
                    const c = marketCache[sym] || { price: '--', changeStr: '--', volStr: '--', colorClass: 'text-neutral' };
                    // 删除了原有的硬占位，btn-del 会在 CSS 控制下悬浮覆盖在最右侧
                    symbolRows += `
                        <div class="symbol-item" id="row-${sym}" data-sym="${sym}">
                            <div class="drag-handle">⋮⋮</div>
                            <div class="col-val name">${sym.replace('USDT', '')}</div>
                            <div class="col-val price ${c.colorClass}" id="price-${sym}">${c.price}</div>
                            <div class="col-val change ${c.colorClass}" id="change-${sym}">${c.changeStr}</div>
                            <div class="col-val vol" id="vol-${sym}">${c.volStr}</div>
                            <div class="btn-del" onclick="delSymbol(${fIndex}, ${sIndex})" title="移除代币">×</div>
                        </div>
                    `;
                });

                folder.symbols.forEach(sym => {
                    if (marketCache[sym] && marketCache[sym].rawChange !== undefined) { folderSum += marketCache[sym].rawChange; validCount++; }
                });

                const fSumStr = validCount > 0 ? (folderSum > 0 ? '+' : '') + folderSum.toFixed(2) + '%' : '--';
                const fSumColor = validCount > 0 ? (folderSum > 0 ? 'text-up' : 'text-down') : 'text-neutral';

                html += `
                    <div class="folder ${folder.isOpen ? '' : 'closed'}" data-id="${folder.id}">
                        <div class="folder-header" onclick="toggleFolder(${fIndex}, event)">
                            <div style="display:flex; align-items:center;">
                                <div class="drag-handle">⋮⋮</div>
                                <span class="arrow">▼</span>
                                <span class="folder-title-text">${folder.name}</span>
                            </div>
                            <div style="display:flex; align-items:center; gap:8px;">
                                <span style="font-weight:bold; font-size:14px;" class="${fSumColor}" id="sum-${folder.id}">${fSumStr}</span>
                            </div>
                            <div class="btn-del" onclick="delFolder(${fIndex}, event)" title="删除分类">×</div>
                        </div>
                        <div class="symbol-list">${symbolRows}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
            initSortable();
        }

        function syncDataFromDOM() {
            const newData = [];
            const folderEls = document.querySelectorAll('.folder');
            folderEls.forEach(fEl => {
                const folderId = fEl.getAttribute('data-id');
                const folderName = fEl.querySelector('.folder-title-text').innerText;
                const isOpen = !fEl.classList.contains('closed');
                const symbols = [];
                fEl.querySelectorAll('.symbol-item').forEach(sEl => { symbols.push(sEl.getAttribute('data-sym')); });
                newData.push({ id: folderId, name: folderName, isOpen: isOpen, symbols: symbols });
            });
            data = newData;
            localStorage.setItem('jelly_data', JSON.stringify(data));
        }

        let sortableInstances = [];
        function initSortable() {
            sortableInstances.forEach(inst => inst.destroy());
            sortableInstances = [];
            const appContent = document.getElementById('app-content');
            if (appContent) {
                sortableInstances.push(Sortable.create(appContent, {
                    handle: '.drag-handle', animation: 200, ghostClass: 'sortable-ghost', onEnd: syncDataFromDOM
                }));
            }
            const symbolLists = document.querySelectorAll('.symbol-list');
            symbolLists.forEach(list => {
                sortableInstances.push(Sortable.create(list, {
                    group: 'shared-symbols', handle: '.drag-handle', animation: 200, ghostClass: 'sortable-ghost',
                    onEnd: function() { syncDataFromDOM(); render(); }
                }));
            });
        }

        function toggleFolder(fIndex, e) {
            if(e.target.closest('.drag-handle') || e.target.closest('.btn-del')) return;
            data[fIndex].isOpen = !data[fIndex].isOpen;
            const folderEl = document.querySelector(`.folder[data-id="${data[fIndex].id}"]`);
            if (folderEl) folderEl.classList.toggle('closed', !data[fIndex].isOpen);
            localStorage.setItem('jelly_data', JSON.stringify(data));
        }

        function addFolder() { const n = prompt("输入分类名称:"); if(n) { data.push({id: 'f'+Date.now(), name: n, isOpen: true, symbols: []}); render(); } }
        function delFolder(idx, e) {
            e.stopPropagation();
            if(confirm("确定删除该分类及内部所有代币？")) {
                data.splice(idx, 1);
                localStorage.setItem('jelly_data', JSON.stringify(data));
                render();
            }
        }
        function addSymbol() { let s = prompt("输入代币:"); if(s) { s = s.toUpperCase().trim(); if(!s.endsWith('USDT')) s += 'USDT'; if(data.length===0) addFolder(); data[0].symbols.push(s); render(); syncUtc0Opens(); } }
        function delSymbol(fi, si) {
            if(confirm("确实要移除此代币？")) {
                data[fi].symbols.splice(si, 1);
                localStorage.setItem('jelly_data', JSON.stringify(data));
                render();
            }
        }
        function togglePin() { const btn = document.getElementById('pin-btn'); const is = btn.classList.toggle('active'); document.title = is ? "PIN_ON" : "PIN_OFF"; }

        function exportData() { const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="Jelly_Backup.json"; a.click(); }
        function importData() { const i=document.createElement("input"); i.type="file"; i.onchange=e=>{ const r=new FileReader(); r.onload=ev=>{ data=JSON.parse(ev.target.result); render(); syncUtc0Opens(); }; r.readAsText(e.target.files[0]); }; i.click(); }

        async function syncUtc0Opens() {
            let allSyms = new Set(); data.forEach(f => f.symbols.forEach(s => allSyms.add(s)));
            for (let s of allSyms) {
                try {
                    const res = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${s}&interval=1d&limit=1`);
                    const klines = await res.json();
                    if(klines && klines.length > 0) utc0Opens[s] = parseFloat(klines[0][1]);
                } catch(e) {}
                await new Promise(r => setTimeout(r, 100));
            }
            fetchMarketData();
        }

        async function fetchMarketData() {
            try {
                const res = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
                const list = await res.json();
                const map = {}; list.forEach(t => map[t.symbol] = t);

                data.forEach(folder => {
                    let fSum = 0; let count = 0;
                    folder.symbols.forEach(sym => {
                        const t = map[sym]; if (!t) return;
                        const p = parseFloat(t.lastPrice);
                        const openPrice = utc0Opens[sym] || parseFloat(t.openPrice);
                        const ch = ((p - openPrice) / openPrice) * 100;
                        const vStr = formatVol(t.quoteVolume);
                        fSum += ch; count++;

                        const pStr = p < 1 ? p.toFixed(5) : (p < 100 ? p.toFixed(3) : p.toFixed(2));
                        const chStr = (ch > 0 ? '+' : '') + ch.toFixed(2) + '%';
                        const cColor = ch > 0 ? 'text-up' : (ch < 0 ? 'text-down' : 'text-neutral');

                        marketCache[sym] = { price: pStr, changeStr: chStr, volStr: vStr, colorClass: cColor, rawChange: ch };

                        const pEl = document.getElementById(`price-${sym}`);
                        const cEl = document.getElementById(`change-${sym}`);
                        const vEl = document.getElementById(`vol-${sym}`);

                        if(pEl && cEl && vEl) {
                            if(globalPrices[sym] && p !== globalPrices[sym]) {
                                pEl.className = 'col-val price ' + (p > globalPrices[sym] ? 'flash-up' : 'flash-down');
                                // 核心修改：闪烁动画结束后，恢复为当日涨跌幅对应的颜色
                                setTimeout(() => { if(pEl) pEl.className = 'col-val price ' + cColor; }, 800);
                            } else {
                                // 如果没有触发闪烁，也要确保最新价颜色与涨跌幅同步
                                pEl.className = 'col-val price ' + cColor;
                            }
                            globalPrices[sym] = p; pEl.innerText = pStr; cEl.innerText = chStr; cEl.className = 'col-val change ' + cColor; vEl.innerText = vStr;
                        }
                    });

                    const sEl = document.getElementById(`sum-${folder.id}`);
                    if(sEl) {
                        sEl.innerText = count > 0 ? (fSum > 0 ? '+' : '') + fSum.toFixed(2) + '%' : '0.00%';
                        sEl.className = count > 0 ? (fSum > 0 ? 'text-up' : 'text-down') : 'text-neutral';
                    }
                });
            } catch (e) {}
        }

        initSettings(); render(); initColumnResizer(); syncUtc0Opens(); setInterval(fetchMarketData, 15000);
        setInterval(syncUtc0Opens, 3600000);
    </script>
</body>
</html>
